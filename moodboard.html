<!DOCTYPE html>
<html>
<body style="margin:0; background:#000; display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; height:100vh; gap:2px;">
    <img id="m1" style="width:100%; height:100%; object-fit:cover;">
    <img id="m2" style="width:100%; height:100%; object-fit:cover;">
    <img id="m3" style="width:100%; height:100%; object-fit:cover;">
    <img id="m4" style="width:100%; height:100%; object-fit:cover;">
    <script>
        window.onmessage = (e) => {
            if(e.data.images) {
                e.data.images.forEach((url, i) => {
                    if(url) document.getElementById('m' + (i+1)).src = url;
                });
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>The Archive | Character Portal</title>
    <link href="style.css" rel="stylesheet" />
</head>
<body>
    <header class="main-nav">
        <div class="logo">THE ARCHIVE</div>
        <nav>
            <button class="nav-btn" onclick="showSection('gallery')">My Archive</button>
            <button class="nav-btn" onclick="showSection('submit')">Register OC</button>
        </nav>
    </header>

    <main>
        <section id="gallery" class="site-section active">
            <div class="gallery-grid" id="character-hub"></div>
        </section>

        <section id="submit" class="site-section">
            <div class="form-container">
                <h2 id="form-title">New Entry Registration</h2>
                <form id="oc-form">
                    <input type="hidden" id="editing-id" value="">
                    
                    <div class="form-flex-row">
                        <div class="upload-zone">
                            <label for="new-portrait" class="custom-upload-btn">📜 Affix Portrait Art</label>
                            <input type="file" id="new-portrait" accept="image/*" style="display:none">
                            <div class="preview-frame"><img id="form-preview" src="michelangelo.jpg"></div>
                        </div>

                        <div class="basic-info">
                            <input type="text" id="new-name" placeholder="Character Name" required>
                            <input type="text" id="new-class" placeholder="Class / Specialty">
                            <input type="text" id="new-spotify" placeholder="Spotify URL (Song/Playlist)">
                            
                            <div class="stat-input-grid">
                                <input type="number" id="in-str" placeholder="STR">
                                <input type="number" id="in-dex" placeholder="DEX">
                                <input type="number" id="in-con" placeholder="CON">
                                <input type="number" id="in-int" placeholder="INT">
                                <input type="number" id="in-wis" placeholder="WIS">
                                <input type="number" id="in-cha" placeholder="CHA">
                            </div>
                        </div>
                    </div>

                    <div class="mood-input-zone">
                        <p style="color:var(--gold); font-size:0.8rem; margin-top:10px;">Mood Board Image URLs (4)</p>
                        <div class="mood-grid-inputs">
                            <input type="text" id="m-url1" placeholder="Image URL 1">
                            <input type="text" id="m-url2" placeholder="Image URL 2">
                            <input type="text" id="m-url3" placeholder="Image URL 3">
                            <input type="text" id="m-url4" placeholder="Image URL 4">
                        </div>
                    </div>

                    <textarea id="new-bio" placeholder="Brief history..."></textarea>
                    
                    <div class="form-controls">
                        <button type="submit" class="gold-btn" id="submit-btn">Seal Record</button>
                        <button type="button" class="cancel-btn" onclick="showSection('gallery')">Cancel</button>
                    </div>
                </form>
            </div>
        </section>

        <div id="dossier-overlay" class="modal-overlay" onclick="closeDossier()">
            <div class="dossier-sheet" onclick="event.stopPropagation()">
                <button class="close-btn" onclick="closeDossier()">×</button>
                <div class="triple-layout">
                    
                    <div class="col-left">
                        <div class="ornate-frame"><img id="view-img" src=""></div>
                        <div class="stat-box-display">
                            <h3>ATTRIBUTES</h3>
                            <div class="stat-line"><span>STR</span><b id="view-str">-</b></div>
                            <div class="stat-line"><span>DEX</span><b id="view-dex">-</b></div>
                            <div class="stat-line"><span>CON</span><b id="view-con">-</b></div>
                            <div class="stat-line"><span>INT</span><b id="view-int">-</b></div>
                            <div class="stat-line"><span>WIS</span><b id="view-wis">-</b></div>
                            <div class="stat-line"><span>CHA</span><b id="view-cha">-</b></div>
                        </div>
                    </div>

                    <div class="col-center">
                        <h2 id="view-class" class="ornate-h2">Class</h2>
                        <h1 id="view-name" class="ornate-h1">Name</h1>
                        <hr class="gold-hr">
                        <h3>Operational History</h3>
                        <div class="scroll-box">
                            <p id="view-bio" class="sheet-p"></p>
                        </div>
                    </div>

                    <div class="col-right">
                        <div class="mood-wrapper">
                            <h4 class="sidebar-title">AESTHETIC ARCHIVE</h4>
                            <iframe id="mood-iframe" src="moodboard.html" frameborder="0"></iframe>
                        </div>

                        <div class="vibe-wrapper">
                            <h4 class="sidebar-title">CHARACTER VIBE</h4>
                            <div id="spotify-container"></div>
                        </div>
                        
                        <div class="action-wrapper">
                            <button class="gold-btn-small" onclick="shareCharacter()">Export Record</button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
</body>
</html>

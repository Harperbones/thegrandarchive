<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE GRAND ARCHIVE | Registry</title>
    <link href="style.css" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=IM+Fell+English&display=swap" rel="stylesheet">
</head>
<body>

<header class="royal-header">
    <div class="header-content">
        <div class="logo-group">
            <h1 class="main-logo">THE GRAND ARCHIVE</h1>
            <p class="subtitle">Official Registry of Anomalies & Legends</p>
        </div>
        <nav class="royal-nav">
            <a href="#" class="nav-link" onclick="showSection('gallery')">The Gallery</a>
            <a href="#" class="nav-link" onclick="showSection('submit')">New Registration</a>
        </nav>
    </div>
</header>

<div class="audio-controller" id="archive-player">
    <div id="global-player-box">
        <iframe id="bg-spotify" 
                src="about:blank" 
                width="100%" height="80" frameBorder="0" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture">
        </iframe>
    </div>
    <div class="player-controls">
        <span class="gramophone-icon">📻</span>
        <button class="audio-toggle" onclick="toggleAudio()">Minimize Player</button>
    </div>
</div>

<main class="main-container">
    
    <section id="gallery" class="site-section active">
        <div class="archive-header">
            <input type="text" id="archive-search" class="regal-search" placeholder="Search the collection..." onkeyup="searchArchive()">
        </div>
        <div class="gallery-grid" id="character-hub">
            </div>
    </section>

    <section id="submit" class="site-section">
        <div class="royal-form-container">
            <div class="form-header">
                <h2>New Entry Registration</h2>
                <p>Ensure all data is accurate before sealing the record.</p>
            </div>
            <form id="oc-form">
                <input type="hidden" id="editing-id" value="">
                
                <div class="form-layout">
                    <div class="upload-column">
                        <div class="preview-frame">
                            <img id="form-preview" src="placeholder.jpg" alt="Preview">
                        </div>
                        <label for="new-portrait" class="custom-upload-btn">📜 Affix Portrait</label>
                        <input type="file" id="new-portrait" accept="image/*" style="display:none">
                    </div>

                    <div class="input-column">
                        <input type="text" id="new-name" class="regal-input" placeholder="Full Name / Designation" required>
                        <input type="text" id="new-class" class="regal-input" placeholder="Classification (e.g. SCP-Class, Race)">
                        <input type="text" id="new-spotify" class="regal-input" placeholder="Spotify Playlist Link">
                        
                        <div class="stat-input-grid" style="grid-template-columns: 1fr;">
                            <input type="text" id="in-age" class="regal-input" placeholder="Age">
                            <input type="text" id="in-bday" class="regal-input" placeholder="Birthday">
                            <input type="text" id="in-source" class="regal-input" placeholder="Where they are a character in...">
                            <input type="text" id="in-extra" class="regal-input" placeholder="Extra Details">
                        </div>

                        <div class="mood-inputs">
                            <input type="text" id="new-mood1" class="regal-input" placeholder="Mood Image 1 URL">
                            <input type="text" id="new-mood2" class="regal-input" placeholder="Mood Image 2 URL">
                        </div>
                    </div>
                </div>

                <textarea id="new-bio" class="regal-textarea" placeholder="Detailed History and Biological Notes..."></textarea>
                
                <div class="form-footer">
                    <button type="submit" class="seal-btn">SEAL RECORD</button>
                    <button type="button" class="regal-btn-close" onclick="showSection('gallery')">Discard Draft</button>
                </div>
            </form>
        </div>
    </section>

    <div id="dossier-overlay" class="modal-overlay" onclick="closeDossier()">
        <div class="dossier-sheet" onclick="event.stopPropagation()">
            <button class="close-top" onclick="closeDossier()">✕</button>
            
            <div class="dossier-layout-triple">
                <div class="dossier-col-left">
                    <div class="ornate-frame"><img id="view-img" src="" alt="Portrait"></div>
                    
                    <div class="stat-block-regal">
                        <h3>BIOGRAPHICAL DATA</h3>
                        <div class="stat-row"><span>AGE</span><b id="view-age">-</b></div>
                        <div class="stat-row"><span>BIRTHDAY</span><b id="view-bday">-</b></div>
                        <div class="stat-row"><span>SOURCE</span><b id="view-source">-</b></div>
                        <div class="stat-row"><span>EXTRA</span><b id="view-extra">-</b></div>
                    </div>
                </div>

                <div class="dossier-col-center">
                    <h2 id="view-class" class="class-label">CLASSIFICATION</h2>
                    <h1 id="view-name" class="name-header">NAME</h1>
                    <div class="scroll-area-regal">
                        <p id="view-bio" class="bio-text"></p>
                    </div>
                </div>

                <div class="dossier-col-right">
                    <div class="mood-section">
                        <h3>AESTHETIC ARCHIVE</h3>
                        <div class="mood-frame">
                            <iframe id="mood-iframe" src="about:blank"></iframe>
                        </div>
                    </div>
                    
                    <div class="links-section">
                        <h3>ARCHIVE ACTIONS</h3>
                        <button class="regal-btn-close" onclick="closeDossier()">✖ CLOSE FILE</button>
                        <button id="redact-btn" class="regal-btn-red">⚠️ REDACT RECORD</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

</main>

  <iframe id="bg-spotify" 
        src="about:blank" 
        width="100%" height="80" 
        frameBorder="0" 
        allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
        loading="lazy">
</iframe>

<script src="script.js"></script>
</body>
</html>
